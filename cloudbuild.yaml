steps:
  # Build only backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA', '-f', 'Dockerfile', 'backend/']
  
  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'bagdar-api', 
           '--image', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA',
           '--region', 'europe-west1',
           '--platform', 'managed',
           '--allow-unauthenticated',
           '--set-env-vars', 'GEMINI_API_KEY=AIzaSyDGDHOiLknGgDUw4kNu9owGBaswFM1mFfk']

images:
  - 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA'

options:
  logging: GCS_ONLY
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA', '-f', 'Dockerfile', 'backend/']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA']
images:
  - 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA'
options:
  logging: GCS_ONLY
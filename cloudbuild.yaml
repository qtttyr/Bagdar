steps:
  # Build only backend (excludes frontend via .gcloudignore)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA', '-f', 'Dockerfile', 'backend/']
  
  # Push image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA']
  
  # Deploy to Cloud Run (key will be set in Cloud Console)
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'bagdar-api', 
           '--image', 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA',
           '--region', 'europe-west1',
           '--platform', 'managed',
           '--allow-unauthenticated']

images:
  - 'gcr.io/$PROJECT_ID/bagdar-api:$COMMIT_SHA'

options:
  logging: GCS_ONLY